<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QCMs Annales — Psychologie & Éthologie</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2ee;
    --surface: #fdfbf8;
    --surface2: #f0ece6;
    --border: #ddd6cc;
    --accent: #7ba3c8;
    --accent2: #c87b8e;
    --correct: #6bab85;
    --wrong: #c8736b;
    --text: #3a3028;
    --text-muted: #8c7d70;
    --tag-etho: #7ba3c8;
    --tag-psycho: #9b82c4;
    --tag-cogni: #c49a4a;
    --tag-neuro: #5db4a0;
    --tag-social: #c87b8e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,.04);
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.15rem;
    letter-spacing: -.5px;
    color: var(--text);
  }
  .logo span { color: var(--accent); }

  .score-bar { display: flex; align-items: center; gap: 20px; }
  .score-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 5px 16px;
    font-family: 'Syne', sans-serif;
    font-size: .85rem;
    font-weight: 600;
    color: var(--text-muted);
  }
  .score-pill .num { color: var(--correct); font-size: 1.05rem; }

  #progress-wrap {
    width: 180px; height: 6px;
    background: var(--border);
    border-radius: 99px; overflow: hidden;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--tag-social));
    border-radius: 99px;
    transition: width .4s ease;
    width: 0%;
  }

  .controls {
    display: flex; gap: 8px; padding: 16px 32px;
    flex-wrap: wrap; align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 6px 14px;
    border-radius: 8px; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: .82rem; font-weight: 500;
    transition: all .2s; letter-spacing: .2px;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); background: #fff; }
  .filter-btn.active { color: #fff; }
  .filter-btn.all.active   { background: var(--text);    border-color: var(--text); }
  .filter-btn.etho.active  { background: var(--tag-etho);  border-color: var(--tag-etho); }
  .filter-btn.psycho.active{ background: var(--tag-psycho);border-color: var(--tag-psycho); }
  .filter-btn.cogni.active { background: var(--tag-cogni); border-color: var(--tag-cogni); }
  .filter-btn.neuro.active { background: var(--tag-neuro); border-color: var(--tag-neuro); }
  .filter-btn.social.active{ background: var(--tag-social);border-color: var(--tag-social); }

  .spacer { flex: 1; }
  .btn-reset {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-muted); padding: 6px 14px; border-radius: 8px;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    font-size: .82rem; transition: all .2s;
  }
  .btn-reset:hover { border-color: var(--accent2); color: var(--accent2); }

  .session-header {
    font-family: 'Syne', sans-serif;
    font-size: .68rem; font-weight: 700;
    letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--text-muted);
    padding: 28px 32px 10px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }

  main { padding: 0 32px 60px; max-width: 860px; margin: 0 auto; }

  .question-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 22px 24px 18px;
    margin-bottom: 12px;
    transition: border-color .2s, box-shadow .2s;
    position: relative;
    box-shadow: 0 1px 4px rgba(0,0,0,.03);
  }
  .question-card:hover { box-shadow: 0 3px 14px rgba(0,0,0,.07); }
  .question-card.answered-correct { border-color: #a8d4b8; background: #fafff9; }
  .question-card.answered-wrong   { border-color: #f0b8b2; background: #fffafa; }

  .q-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .q-num { font-family: 'Syne', sans-serif; font-weight: 700; font-size: .78rem; color: var(--text-muted); }
  .q-tag {
    font-size: .66rem; font-weight: 600;
    letter-spacing: .7px; text-transform: uppercase;
    padding: 2px 8px; border-radius: 5px;
  }
  .tag-etho  { background: #deeaf5; color: #4a7aab; }
  .tag-psycho{ background: #ece5f5; color: #7358ab; }
  .tag-cogni { background: #f5eddb; color: #9a6e1a; }
  .tag-neuro { background: #d9f0ec; color: #2e8a78; }
  .tag-social{ background: #f5dde4; color: #a8415a; }
  .multi-badge {
    font-size: .64rem; background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted); padding: 2px 7px; border-radius: 5px;
  }

  .q-text { font-size: .95rem; color: var(--text); margin-bottom: 14px; line-height: 1.65; font-weight: 400; }

  .options { display: flex; flex-direction: column; gap: 7px; }
  .option {
    display: flex; align-items: flex-start; gap: 11px;
    padding: 10px 13px; border-radius: 9px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    cursor: pointer; transition: all .16s; user-select: none;
  }
  .option:hover:not(.locked) { border-color: var(--accent); background: #eef4fb; }
  .option.selected  { border-color: var(--accent); background: #deeaf5; }
  .option.correct   { border-color: #6bab85 !important; background: #eaf6ee !important; }
  .option.wrong     { border-color: #c8736b !important; background: #faecea !important; }
  .option.missed    { border-color: #6bab85; background: #f2fbf5; }
  .option.locked    { cursor: default; }

  .opt-letter {
    width: 22px; height: 22px; min-width: 22px;
    border-radius: 6px; background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: .72rem; font-weight: 700; color: var(--text-muted);
    transition: all .16s; margin-top: 1px;
  }
  .option.selected .opt-letter { background: var(--accent); color: #fff; }
  .option.correct  .opt-letter { background: var(--correct); color: #fff; }
  .option.wrong    .opt-letter { background: var(--wrong);   color: #fff; }
  .option.missed   .opt-letter { background: var(--correct); color: #fff; }

  .opt-text { font-size: .88rem; line-height: 1.5; color: var(--text); }

  .btn-validate {
    margin-top: 13px;
    background: var(--accent); border: none; color: #fff;
    padding: 8px 20px; border-radius: 8px; cursor: pointer;
    font-family: 'Syne', sans-serif; font-size: .8rem; font-weight: 600;
    letter-spacing: .2px; transition: all .2s;
  }
  .btn-validate:hover { background: #6490b5; transform: translateY(-1px); }
  .btn-validate:disabled { opacity: .45; cursor: default; transform: none; background: var(--border); color: var(--text-muted); }

  .feedback {
    display: none; margin-top: 11px; padding: 10px 14px;
    border-radius: 8px; font-size: .84rem; line-height: 1.55;
  }
  .feedback.correct { background: #eaf6ee; border: 1px solid #b8dfc5; color: #3a7a55; }
  .feedback.wrong   { background: #faecea; border: 1px solid #eab8b4; color: #8a3530; }
  .feedback.show { display: block; }

  .q-result-icon {
    position: absolute; top: 18px; right: 18px;
    font-size: 1rem; display: none; opacity: .8;
  }
  .question-card.answered-correct .q-result-icon,
  .question-card.answered-wrong   .q-result-icon { display: block; }

  .empty { text-align: center; padding: 60px; color: var(--text-muted); }

  #final-score {
    display: none; position: fixed; inset: 0;
    background: rgba(58,48,40,.45);
    backdrop-filter: blur(8px); z-index: 999;
    align-items: center; justify-content: center;
  }
  #final-score.show { display: flex; }
  .score-modal {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 20px; padding: 44px 52px;
    text-align: center; max-width: 400px; width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,.12);
  }
  .score-modal h2 { font-family: 'Syne', sans-serif; font-size: 1.6rem; margin-bottom: 6px; }
  .score-big { font-family: 'Syne', sans-serif; font-size: 3.6rem; font-weight: 800; color: var(--correct); margin: 18px 0; }
  .score-modal p { color: var(--text-muted); margin-bottom: 26px; line-height: 1.6; }
  .score-modal button {
    background: var(--accent); border: none; color: #fff;
    padding: 11px 28px; border-radius: 10px; cursor: pointer;
    font-family: 'Syne', sans-serif; font-weight: 600; font-size: .9rem;
    transition: background .2s;
  }
  .score-modal button:hover { background: #6490b5; }

  @media (max-width: 600px) {
    header { padding: 12px 16px; }
    .controls { padding: 10px 16px; }
    main { padding: 0 14px 40px; }
    .session-header { padding: 18px 16px 8px; }
    #progress-wrap { width: 110px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">QCM <span>Annales</span></div>
  <div class="score-bar">
    <div class="score-pill">
      <span class="num" id="score-num">0</span>
      <span class="total"> / <span id="score-total">0</span> validées</span>
    </div>
    <div id="progress-wrap"><div id="progress-bar"></div></div>
  </div>
</header>

<div class="controls">
  <button class="filter-btn all active" onclick="filterBy('all',this)">Tout</button>
  <button class="filter-btn etho"   onclick="filterBy('etho',this)">Éthologie</button>
  <button class="filter-btn psycho" onclick="filterBy('psycho',this)">Psycho. du développement</button>
  <button class="filter-btn cogni"  onclick="filterBy('cogni',this)">Psychologie cognitive</button>
  <button class="filter-btn neuro"  onclick="filterBy('neuro',this)">Neuropsychologie</button>
  <button class="filter-btn social" onclick="filterBy('social',this)">Psychologie sociale</button>
  <div class="spacer"></div>
  <button class="btn-reset" onclick="resetAll()">↺ Réinitialiser</button>
</div>

<div id="questions-container"></div>

<div id="final-score">
  <div class="score-modal">
    <h2>Terminé !</h2>
    <div class="score-big" id="modal-score"></div>
    <p id="modal-msg"></p>
    <button onclick="document.getElementById('final-score').classList.remove('show')">Revoir les réponses</button>
  </div>
</div>

<script>
const QUESTIONS = [

// ══════════════════════════════════════════
// SESSION 1 (2023-2024) — ÉTHOLOGIE (Darmaillacq)
// ══════════════════════════════════════════
{
  id:1, session:"Session 1 (2023-2024)", cat:"etho",
  text:"La tabula rasa :",
  multi:true,
  options:[
    {l:"a", t:"Est un concept similaire à l'innéisme"},
    {l:"b", t:"Est un concept moderne datant du 20e siècle"},
    {l:"c", t:"Signifie que l'histoire d'un individu commence à la fécondation"},
    {l:"d", t:"Désigne le concept selon lequel l'esprit humain naîtrait vierge et serait marqué par la seule expérience vécue après la naissance"},
    {l:"e", t:"Correspond à la programmation fœtale (fetal programming)"}
  ],
  correct:["d"],
  explication:"Selon le cours (Darmaillacq), la tabula rasa est le concept d'Aristote et Locke selon lequel l'esprit naît vierge et se marque par la seule expérience après la naissance. Elle s'oppose au concept d'inné. La naissance est donc le point de départ, ce qui nie tout ce qui se passe avant."
},
{
  id:2, session:"Session 1 (2023-2024)", cat:"etho",
  text:"Quelle est l'ordre correct de mise en place des systèmes sensoriels chez les vertébrés ?",
  multi:true,
  options:[
    {l:"a", t:"Olfactif – tactile – auditif – visuel – chimiосensoriel"},
    {l:"b", t:"Tactile – vestibulaire – chimiосensoriel (olfactif/gustatif) – auditif – visuel"},
    {l:"c", t:"Auditif – tactile – olfactif – visuel – chimiосensoriel"},
    {l:"d", t:"Visuel – auditif – tactile – olfactif – chimiосensoriel"},
    {l:"e", t:"Chimiосensoriel – vestibulaire – auditif – tactile – visuel"}
  ],
  correct:["b"],
  explication:"Selon les cours (Darmaillacq et Molina), l'ordre est : tactile > vestibulaire > chimiосensoriel (olfactif/gustatif) > auditif > visuel. Cet échelonnement permettrait au système nerveux central encore en maturation de traiter les informations progressivement."
},
{
  id:3, session:"Session 1 (2023-2024)", cat:"etho",
  text:"Une période sensible :",
  multi:true,
  options:[
    {l:"a", t:"Est une période pendant laquelle les apprentissages sont impossibles"},
    {l:"b", t:"Est strictement synonyme de période critique"},
    {l:"c", t:"Est une période pendant laquelle un apprentissage est facilité, pour un individu, un motif ou un comportement donné"},
    {l:"d", t:"Ne concerne que les mammifères"},
    {l:"e", t:"Est caractérisée par une plasticité totalement absente avant et après"}
  ],
  correct:["c"],
  explication:"Une fenêtre/période sensible est une période où un apprentissage est facilité pour un individu, motif ou comportement donné. Elle est moins rigide qu'une période critique. Ex : l'empreinte filiale chez les oiseaux nidifuges, ou l'apprentissage du langage dans l'enfance."
},
{
  id:4, session:"Session 1 (2023-2024)", cat:"etho",
  text:"Concernant l'étude de Coureaud et al. (2002) sur les lapereaux :",
  multi:true,
  options:[
    {l:"a", t:"Les lapereaux non exposés au cumin in utero ne font pas de différence entre placenta standard et odorisé"},
    {l:"b", t:"Les lapereaux exposés au cumin in utero préfèrent clairement le placenta odorisé (cumin) au placenta standard"},
    {l:"c", t:"Tous les lapereaux sans exception préfèrent le placenta cumin"},
    {l:"d", t:"Cette étude démontre que l'apprentissage prénatal olfactif est possible chez le lapin"},
    {l:"e", t:"L'exposition in utero n'a aucun effet sur les préférences postnatales"}
  ],
  correct:["a","b","d"],
  explication:"Selon le cours (Darmaillacq) : les lapins exposés au cumin IN UTERO préfèrent clairement le placenta cumin. Ceux non exposés ne font pas la différence. Cela démontre que l'apprentissage prénatal olfactif est possible. L'exposition crée une préférence sélective postnatale."
},
{
  id:5, session:"Session 1 (2023-2024)", cat:"etho",
  text:"L'habituation est :",
  multi:true,
  options:[
    {l:"a", t:"La diminution voire la disparition d'une réponse à la suite de la présentation répétée ou continue d'un stimulus"},
    {l:"b", t:"Un apprentissage associatif (comme le conditionnement classique)"},
    {l:"c", t:"Un apprentissage non associatif"},
    {l:"d", t:"La même chose que la sensibilisation (amplification de réponse)"},
    {l:"e", t:"Différente de la sensibilisation qui est une amplification de la réponse"}
  ],
  correct:["a","c","e"],
  explication:"Selon le cours (Darmaillacq), l'habituation est la diminution voire disparition d'une réponse à la suite d'une stimulation répétée. C'est un apprentissage NON ASSOCIATIF (simple), différent de la sensibilisation (amplification de la réponse) et du conditionnement (associatif)."
},
{
  id:6, session:"Session 1 (2023-2024)", cat:"etho",
  text:"Le canon de Morgan (principe de parcimonie) stipule que :",
  multi:true,
  options:[
    {l:"a", t:"On doit toujours interpréter le comportement animal comme le fruit d'un processus cognitif complexe"},
    {l:"b", t:"En aucun cas on ne doit interpréter une faculté comme étant le fruit d'un processus complexe si elle peut être expliquée par un mécanisme plus simple"},
    {l:"c", t:"Les animaux ont les mêmes états mentaux que les humains"},
    {l:"d", t:"Il faut toujours utiliser l'anthropomorphisme pour interpréter le comportement animal"},
    {l:"e", t:"L'intelligence animale est égale à l'intelligence humaine"}
  ],
  correct:["b"],
  explication:"Le canon de Morgan (principe de parcimonie) : en aucun cas on ne doit interpréter une faculté comme étant le fruit d'un processus complexe si elle peut être expliquée par un mécanisme plus simple. C'est une réaction contre l'anthropomorphisme de Romanes."
},
{
  id:7, session:"Session 1 (2023-2024)", cat:"etho",
  text:"La cognition animale (définition de Shettleworth 2009) regroupe :",
  multi:true,
  options:[
    {l:"a", t:"Uniquement les comportements innés des animaux"},
    {l:"b", t:"Les mécanismes par lesquels les animaux perçoivent, acquièrent, traitent, retiennent les informations et produisent une réponse sur l'environnement"},
    {l:"c", t:"L'intelligence des primates uniquement"},
    {l:"d", t:"Les comportements exclusivement appris par conditionnement"},
    {l:"e", t:"L'ensemble des réflexes nerveux de l'animal"}
  ],
  correct:["b"],
  explication:"Selon Shettleworth (2009) cité dans le cours : la cognition animale regroupe les mécanismes par lesquels les animaux perçoivent, acquièrent, traitent et retiennent les informations et produisent une réponse sur l'environnement. C'est différent du terme 'intelligence animale' qui est réducteur."
},
{
  id:8, session:"Session 1 (2023-2024)", cat:"etho",
  text:"Tolman, travaillant avec des labyrinthes, a apporté les concepts de :",
  multi:true,
  options:[
    {l:"a", t:"Carte cognitive"},
    {l:"b", t:"Apprentissage latent"},
    {l:"c", t:"Concept d'atteinte (d'un but)"},
    {l:"d", t:"Conditionnement opérant"},
    {l:"e", t:"Boîte à problèmes"}
  ],
  correct:["a","b","c"],
  explication:"Tolman (labyrinthes avec rats) a apporté : le concept de carte cognitive (représentation mentale du labyrinthe), le concept d'atteinte (d'un but) et l'apprentissage latent (un rat explore un labyrinthe sans renforcement et apprend quand même les caractéristiques spatiales)."
},

// ══════════════════════════════════════════
// SESSION 1 (2023-2024) — SPATIALITÉ (Jozet)
// ══════════════════════════════════════════
{
  id:9, session:"Session 1 (2023-2024)", cat:"etho",
  text:"La stratégie d'intégration de trajet (path integration) se distingue des stratégies de route et du fil d'Ariane car :",
  multi:true,
  options:[
    {l:"a", t:"L'individu revient exactement par le même chemin qu'à l'aller"},
    {l:"b", t:"L'individu revient en ligne droite vers son point de départ"},
    {l:"c", t:"Elle ne nécessite aucune information sensorielle"},
    {l:"d", t:"Elle est la plus simple et la moins sujette à erreur"},
    {l:"e", t:"Elle n'est possible que chez les oiseaux migrateurs"}
  ],
  correct:["b"],
  explication:"Selon le cours (Jozet) : ATTENTION, contrairement à la stratégie de route ou du petit poucet, avec l'intégration de trajet, on revient EN LIGNE DROITE vers son point de départ (pas le même chemin). Cette information est soulignée comme importante pour l'examen."
},
{
  id:10, session:"Session 1 (2023-2024)", cat:"etho",
  text:"Le biais directionnel lors de l'intégration de trajet correspond à :",
  multi:true,
  options:[
    {l:"a", t:"Une sous-estimation de l'angle de retour de 26% en moyenne"},
    {l:"b", t:"Une surestimation de l'angle de retour de 26% en moyenne"},
    {l:"c", t:"Une erreur aléatoire sans valeur systématique"},
    {l:"d", t:"Une tendance à revenir par le chemin de l'aller"},
    {l:"e", t:"Un biais observé uniquement chez les femmes"}
  ],
  correct:["b"],
  explication:"Selon le cours (Jozet) : lors de l'intégration de trajet, il y a une SURESTIMATION de l'angle de retour de 26% en moyenne. C'est une erreur systématique (biais directionnel) liée à une accumulation de bruit au niveau du système vestibulaire. Chez le chien c'est 15°."
},
{
  id:11, session:"Session 1 (2023-2024)", cat:"etho",
  text:"Concernant les substrats neuronaux des stratégies spatiales :",
  multi:true,
  options:[
    {l:"a", t:"La stratégie allocentrée (savoir OÙ est le but) est centrée sur l'hippocampe"},
    {l:"b", t:"La stratégie égocentrée (savoir COMMENT aller au but) est centrée sur le striatum dorsal (noyau caudé + putamen)"},
    {l:"c", t:"L'hippocampe traite uniquement les stratégies égocentrées"},
    {l:"d", t:"Le noyau caudé est activé lors de la navigation allocentrée"},
    {l:"e", t:"Les adultes âgés qui réussissent les recombinaisons spatiales sont ceux qui avaient une activation hippocampique en phase d'acquisition"}
  ],
  correct:["a","b","e"],
  explication:"Selon le cours (Jozet) : hippocampe = stratégie allocentrée ; striatum dorsal (noyau caudé + putamen) = stratégie égocentrée. Les adultes âgés réussissant les recombinaisons sont ceux avec activation hippocampique en phase 1 (pas noyau caudé)."
},
{
  id:12, session:"Session 1 (2023-2024)", cat:"etho",
  text:"Les cellules de lieu (place cells) et les cellules de grille (grid cells) : lesquels de ces énoncés sont corrects ?",
  multi:true,
  options:[
    {l:"a", t:"Les cellules de lieu se trouvent dans l'hippocampe et s'activent selon la localisation de l'individu dans l'espace"},
    {l:"b", t:"Les cellules de grille se trouvent dans le cortex entorhinal et encodent la distance (système métrique)"},
    {l:"c", t:"Les cellules de lieu encodent uniquement la vitesse de déplacement"},
    {l:"d", t:"Les cellules frontières s'activent aux bordures de l'environnement"},
    {l:"e", t:"Les cellules d'orientation de la tête (head-direction cells) ont été identifiées par Ranck en 1985"}
  ],
  correct:["a","b","d","e"],

  id:385, session:"Annales – Psychologie cognitive – Session 7", cat:"cogni",
  text:"Des indices de repérage des sujets H.P.I. peuvent être observés à l'école maternelle :",
  multi:true,
  options:[{l:"a", t:"Un décalage avec les autres enfants sur les objets de discussion"},{l:"b", t:"Un décalage avec les autres enfants car les H.P.I. questionnent les objets de l'enseignement"},{l:"c", t:"Un décalage avec les autres enfants car les H.P.I. jouent à des jeux de leur âge"},{l:"d", t:"Un décalage avec les autres enfants car les H.P.I. sont très intégrés dans le groupe"},{l:"e", t:"Un décalage avec les autres enfants car les H.P.I. sont très motivés par les méthodes d'apprentissage"}],
  correct:["a", "b"],
  explication:"Cours Salinas : Indices de repérage d'un enfant HP à l'école maternelle : vient à l'école avec réticence (après les premières semaines), N'adhère PAS aux rituels, est en demande d'apprentissages de NIVEAU SUPÉRIEUR, présente une DISCORDANCE oral/écrit (difficultés en graphisme), est plus à l'aise avec les ADULTES qu'avec les enfants de son âge."
},
{
  id:386, session:"Annales – Psychologie cognitive – Session 7", cat:"cogni",
  text:"Le style cognitif :",
  multi:true,
  options:[{l:"a", t:"Est un type de rapport que l'individu entretient avec son environnement"},{l:"b", t:"Est un type de rapport qui ne concerne que l'individu avec lui-même"},{l:"c", t:"N'est pas influencé par la culture"},{l:"d", t:"N'est pas influencé par la subculture"},{l:"e", t:"Est influencé par la culture"}],
  correct:["a", "e"],
  explication:"Cours Salinas : Le style cognitif est un type de rapport que l'individu entretient avec son ENVIRONNEMENT. Il est INFLUENCÉ par la CULTURE et la sous-culture. La pensée analytique (cultures occidentales) = séparation objet/contexte, attributs intrinsèques. La pensée holistique (cultures asiatiques) = relations objet/contexte, scène globale, prédiction par le contexte."
}
];

// ─────────────────────────────────────────
let state = { answers:{}, validated:{}, correct_count:0, validated_count:0, filter:'all' };

function filterBy(cat, btn) {
  state.filter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderQuestions();
}

function getFiltered() {
  return state.filter === 'all' ? QUESTIONS : QUESTIONS.filter(q => q.cat === state.filter);
}

function renderQuestions() {
  const container = document.getElementById('questions-container');
  const filtered = getFiltered();
  if (!filtered.length) {
    container.innerHTML = '<div class="empty">Aucune question pour ce filtre.</div>';
    return;
  }
  const catLabels = {etho:'Éthologie', psycho:'Psycho. du développement', cogni:'Psychologie cognitive', neuro:'Neuropsychologie', social:'Psychologie sociale'};
  let html = '', lastSession = '';
  filtered.forEach(q => {
    if (q.session !== lastSession) {
      lastSession = q.session;
      html += `<div class="session-header">${q.session}</div>`;
    }
    const answered = state.validated[q.id];
    const sel = state.answers[q.id] || [];
    const isCorrect = answered && arraysEqual(sel.slice().sort(), q.correct.slice().sort());
    html += `
    <div class="question-card ${answered ? (isCorrect ? 'answered-correct':'answered-wrong') : ''}" id="qcard-${q.id}">
      <div class="q-result-icon">${isCorrect ? '✓' : '✗'}</div>
      <div class="q-meta">
        <span class="q-num">Q${q.id}</span>
        <span class="q-tag tag-${q.cat}">${catLabels[q.cat]}</span>
        ${q.multi ? '<span class="multi-badge">Plusieurs réponses possibles</span>' : ''}
      </div>
      <div class="q-text">${q.text}</div>
      <div class="options">
        ${q.options.map(o => {
          let cls = 'option';
          if (answered) {
            cls += ' locked';
            const ok = q.correct.includes(o.l);
            const chosen = sel.includes(o.l);
            if (ok && chosen)  cls += ' correct';
            else if (!ok && chosen) cls += ' wrong';
            else if (ok && !chosen) cls += ' missed';
          } else if (sel.includes(o.l)) cls += ' selected';
          return `<div class="${cls}" onclick="toggleOption(${q.id},'${o.l}')">
            <div class="opt-letter">${o.l}</div>
            <div class="opt-text">${o.t}</div>
          </div>`;
        }).join('')}
      </div>
      <button class="btn-validate" id="btn-${q.id}" onclick="validateQuestion(${q.id})" ${answered?'disabled':''}>
        ${answered ? '✓ Validé' : 'Valider'}
      </button>
      <div class="feedback ${answered?'show':''} ${answered?(isCorrect?'correct':'wrong'):''}" id="fb-${q.id}">
        ${answered ? (isCorrect
          ? '✓ Bonne réponse !'
          : `✗ Réponse incorrecte. Bonne(s) réponse(s) : <strong>${q.correct.join(', ')}</strong>`) : ''}
        ${answered && q.explication ? `<br><small style="opacity:.85;font-style:italic;margin-top:4px;display:block">${q.explication}</small>` : ''}
      </div>
    </div>`;
  });
  container.innerHTML = `<main>${html}</main>`;
  updateScoreBar();
}

function toggleOption(qId, letter) {
  if (state.validated[qId]) return;
  const q = QUESTIONS.find(q => q.id === qId);
  if (!state.answers[qId]) state.answers[qId] = [];
  const idx = state.answers[qId].indexOf(letter);
  if (q.multi) {
    if (idx >= 0) state.answers[qId].splice(idx, 1);
    else state.answers[qId].push(letter);
  } else {
    state.answers[qId] = [letter];
  }
  renderQuestions();
}

function validateQuestion(qId) {
  if (!state.answers[qId] || !state.answers[qId].length) return;
  const q = QUESTIONS.find(q => q.id === qId);
  state.validated[qId] = true;
  state.validated_count++;
  if (arraysEqual(state.answers[qId].slice().sort(), q.correct.slice().sort())) state.correct_count++;
  renderQuestions();
  const total = QUESTIONS.length;
  if (state.validated_count === total) showFinalScore();
}

function updateScoreBar() {
  const filtered = getFiltered();
  const valInFilter = filtered.filter(q => state.validated[q.id]).length;
  const corrInFilter = filtered.filter(q => {
    if (!state.validated[q.id]) return false;
    return arraysEqual((state.answers[q.id]||[]).slice().sort(), q.correct.slice().sort());
  }).length;
  document.getElementById('score-num').textContent = corrInFilter;
  document.getElementById('score-total').textContent = valInFilter;
  document.getElementById('progress-bar').style.width = filtered.length ? (valInFilter/filtered.length*100)+'%' : '0%';
}

function showFinalScore() {
  const total = QUESTIONS.length;
  const pct = Math.round(state.correct_count / total * 100);
  document.getElementById('modal-score').textContent = state.correct_count + ' / ' + total;
  const msgs = [[90,'🏆 Excellent ! Vous maîtrisez ces annales.'],[70,'👍 Très bon résultat ! Quelques points à affiner.'],[50,'📚 Résultat moyen — continuez à réviser !'],[0,'💪 Il faut retravailler ces notions. Courage !']];
  document.getElementById('modal-msg').textContent = msgs.find(([t]) => pct >= t)[1] + ` (${pct}%)`;
  document.getElementById('final-score').classList.add('show');
}

function resetAll() {
  if (!confirm('Réinitialiser toutes les réponses ?')) return;
  state = { answers:{}, validated:{}, correct_count:0, validated_count:0, filter:state.filter };
  renderQuestions();
}

function arraysEqual(a, b) {
  return a.length === b.length && a.every((v,i) => v === b[i]);
}

renderQuestions();
</script>
